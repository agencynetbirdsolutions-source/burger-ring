<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .image-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

        .image-wrapper img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
        }

        .image-wrapper a {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
        }

        /* Mobile optimization */
        @media (max-width: 768px) {
            .image-wrapper img {
                max-width: 100vw;
                max-height: 100vh;
            }
        }

        /* Tablet optimization */
        @media (min-width: 769px) and (max-width: 1024px) {
            .image-wrapper img {
                max-width: 100vw;
                max-height: 100vh;
            }
        }

        /* Desktop optimization */
        @media (min-width: 1025px) {
            .image-wrapper img {
                max-width: 100vw;
                max-height: 100vh;
            }
        }

        /* Landscape orientation */
        @media (orientation: landscape) {
            .image-wrapper img {
                max-width: 100vw;
                max-height: 100vh;
            }
        }

        /* Portrait orientation */
        @media (orientation: portrait) {
            .image-wrapper img {
                max-width: 100vw;
                max-height: 100vh;
            }
        }

        /* Prevent image dragging */
        img {
            user-select: none;
            -webkit-user-drag: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-wrapper">
            <a href="https://wa.link/c4nwom" target="_blank" rel="noopener noreferrer">
                <img src="4.webp" alt="" loading="high">
            </a>
        </div>
    </div>

    <script>
        // Ensure image loads and scales properly
        const img = document.querySelector('.image-wrapper img');
        
        // Handle image load
        img.addEventListener('load', function() {
            console.log('Image loaded successfully');
        });

        // Handle image error
        img.addEventListener('error', function() {
            console.error('Error loading image: red.webp');
            // Show error message
            document.body.innerHTML = '<div style="color: white; text-align: center; padding: 20px;">Image not found. Please ensure red.webp is in the same directory as this file.</div>';
        });

        // Handle window resize for responsive scaling
        window.addEventListener('resize', function() {
            // Image will automatically scale due to CSS
        });

        // Prevent context menu on image
        img.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // Optional: Add touch feedback on mobile
        if (window.matchMedia('(hover: none)').matches) {
            img.style.opacity = '0.9';
            img.addEventListener('touchstart', function() {
                this.style.opacity = '0.8';
            });
            img.addEventListener('touchend', function() {
                this.style.opacity = '0.9';
            });
        }
    </script>
</body>
</html>
